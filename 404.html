<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <link rel="icon" type="image/svg+xml" href="images/portrait.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #F0F4F8;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 500px; }
        h1 { font-size: 8rem; font-weight: 900; color: #fa033a; line-height: 1; }
        p { font-size: 1.2rem; color: #666; margin: 1rem 0 2rem; }
        a {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: #fa033a;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        a:hover { background: #d60233; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Страница не найдена. Возможно, она была удалена или вы ввели неправильный адрес.</p>
        <a href="/">На главную</a>
    </div>
</body>
</html>
